name: climada_env
channels:
  - conda-forge
dependencies:
  # Core Python
  - python=3.11
  
  # Main dependencies (from conda where possible)
  - numpy>=1.26.0
  - pandas
  - xarray>=2024.9.0
  - matplotlib>=3.9.0
  - cartopy>=0.23.0
  - geopandas>=1.0.0
  - scipy>=1.14.0
  - shapely>=2.0.0
  - gdal=3.8.4
  
  # Development dependencies
  - pytest>=8.3.5
  - pytest-cov>=6.0.0
  - pylint>=3.3.5
  - mypy>=1.15.0
  - sphinx>=8.1.3
  - yapf>=0.43.0
  
  # Pip for remaining packages
  - pip
  - pip:
    # CLIMADA from GitHub (forecast-class branch)
    - git+https://github.com/CLIMADA-project/climada_python.git@forecast-class
    # PyPI-only packages
    - earthkit-data>=0.20.0
    - meteodata-lab>=0.7.2
    - srtm-py>=0.3.0
    - pydata-sphinx-theme>=0.16.1
    - sphinx-autoapi>=3.6.0
